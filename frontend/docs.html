<head>
  <meta charset="UTF-8" />

  <style>
    /* ── Swagger UI dark theme overrides ─────────────────────────── */
    body { background: var(--bg) !important; }

    .swagger-ui { color: var(--text) !important; font-family: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif !important; }

    /* Top bar */
    .swagger-ui .topbar { display: none !important; }

    /* Info block */
    .swagger-ui .info { margin: 1.5rem 0 !important; }
    .swagger-ui .info .title { color: var(--text) !important; font-weight: 800 !important; letter-spacing: -.04em !important; }
    .swagger-ui .info .title small { background: var(--accent) !important; color: #0b0f14 !important; border-radius: 4px !important; padding: .1rem .4rem !important; font-size: .7rem !important; }
    .swagger-ui .info p, .swagger-ui .info li { color: var(--muted) !important; }
    .swagger-ui .info a { color: var(--accent) !important; }

    /* Scheme container */
    .swagger-ui .scheme-container { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; box-shadow: none !important; padding: 1rem !important; }

    /* Operation blocks */
    .swagger-ui .opblock { background: var(--card) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; box-shadow: none !important; margin-bottom: .6rem !important; }
    .swagger-ui .opblock:hover { border-color: rgba(61,214,140,.4) !important; }
    .swagger-ui .opblock.is-open { border-color: var(--accent) !important; }
    .swagger-ui .opblock .opblock-summary { border: none !important; }
    .swagger-ui .opblock .opblock-summary-path { color: var(--text) !important; font-weight: 600 !important; font-family: var(--mono) !important; }
    .swagger-ui .opblock .opblock-summary-description { color: var(--muted) !important; }
    .swagger-ui .opblock-body { background: var(--card2) !important; }
    .swagger-ui .opblock-section-header { background: var(--card2) !important; border-bottom: 1px solid var(--border) !important; }
    .swagger-ui .opblock-section-header label { color: var(--muted) !important; }

    /* HTTP method badges */
    .swagger-ui .opblock-summary-method { border-radius: 6px !important; font-weight: 700 !important; min-width: 60px !important; }
    .swagger-ui .opblock.opblock-get    .opblock-summary-method { background: rgba(96,165,250,.85) !important; }
    .swagger-ui .opblock.opblock-post   .opblock-summary-method { background: rgba(61,214,140,.85) !important; color: #0b0f14 !important; }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: rgba(248,113,113,.85) !important; }
    .swagger-ui .opblock.opblock-put    .opblock-summary-method { background: rgba(251,191,36,.85) !important; color: #0b0f14 !important; }
    .swagger-ui .opblock.opblock-get    { border-left: 3px solid rgba(96,165,250,.6) !important; }
    .swagger-ui .opblock.opblock-post   { border-left: 3px solid var(--accent) !important; }
    .swagger-ui .opblock.opblock-delete { border-left: 3px solid var(--danger) !important; }

    /* Tags / sections */
    .swagger-ui .opblock-tag { color: var(--text) !important; border-bottom: 1px solid var(--border) !important; font-weight: 700 !important; font-size: .95rem !important; }
    .swagger-ui .opblock-tag:hover { background: var(--card) !important; border-radius: var(--radius) !important; }
    .swagger-ui .opblock-tag small { color: var(--muted) !important; }

    /* Parameters table */
    .swagger-ui table thead tr th { color: var(--muted) !important; border-bottom: 1px solid var(--border) !important; font-size: .78rem !important; text-transform: uppercase !important; letter-spacing: .06em !important; }
    .swagger-ui table tbody tr td { color: var(--text) !important; border-bottom: 1px solid rgba(30,45,66,.5) !important; }
    .swagger-ui .parameter__name { color: var(--accent) !important; font-family: var(--mono) !important; font-weight: 600 !important; }
    .swagger-ui .parameter__type { color: var(--muted) !important; font-family: var(--mono) !important; }
    .swagger-ui .parameter__in { color: var(--info) !important; font-size: .72rem !important; font-weight: 600 !important; text-transform: uppercase !important; }

    /* Inputs */
    .swagger-ui input, .swagger-ui select, .swagger-ui textarea {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 8px !important;
    }
    .swagger-ui input:focus, .swagger-ui select:focus {
      border-color: var(--accent) !important;
      outline: none !important;
    }

    /* Buttons */
    .swagger-ui .btn { border-radius: 8px !important; font-weight: 600 !important; transition: transform 150ms ease !important; }
    .swagger-ui .btn.execute { background: var(--accent) !important; color: #0b0f14 !important; border-color: var(--accent) !important; }
    .swagger-ui .btn.execute:hover { transform: translateY(-1px) !important; }
    .swagger-ui .btn.cancel { background: var(--card) !important; border-color: var(--border) !important; color: var(--muted) !important; }
    .swagger-ui .try-out__btn { background: var(--card2) !important; border-color: var(--border) !important; color: var(--muted) !important; }
    .swagger-ui .try-out__btn:hover { border-color: var(--accent) !important; color: var(--accent) !important; }

    /* Response blocks */
    .swagger-ui .responses-inner { background: var(--card2) !important; }
    .swagger-ui .response-col_status { color: var(--accent) !important; font-family: var(--mono) !important; font-weight: 700 !important; }
    .swagger-ui .response-col_description { color: var(--muted) !important; }
    .swagger-ui .highlight-code { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; }
    .swagger-ui .microlight { color: var(--text) !important; font-family: var(--mono) !important; font-size: .82rem !important; }
    .swagger-ui .response-control-media-type__accept-message { color: var(--muted) !important; }

    /* Model / schema */
    .swagger-ui .model-box { background: var(--card) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; }
    .swagger-ui .model { color: var(--text) !important; }
    .swagger-ui .prop-type { color: var(--info) !important; }
    .swagger-ui .prop-format { color: var(--muted) !important; }
    .swagger-ui section.models { border: 1px solid var(--border) !important; border-radius: var(--radius) !important; }
    .swagger-ui section.models h4 { color: var(--text) !important; border-bottom: 1px solid var(--border) !important; }
    .swagger-ui .model-toggle { color: var(--accent) !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Wrapper */
    #swagger-ui { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem 3rem; }
  </style>
</head>
