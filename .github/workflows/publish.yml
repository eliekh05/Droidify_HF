name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  sync:
    name: Push to Hugging Face
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write build info to bust HF Docker layer cache
        run: |
          echo "sha=${{ github.sha }}" > BUILD_INFO
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> BUILD_INFO
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add BUILD_INFO
          git diff --cached --quiet || git commit -m "ci: bust cache [${{ github.sha }}]"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://eliekh05:${HF_TOKEN}@huggingface.co/spaces/eliekh05/Droidify_HF
          git push hf main:main --force
